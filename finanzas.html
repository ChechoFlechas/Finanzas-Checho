<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Finanzas · USD/COP</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface-alt: #f9f8f5;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.15);
    --text: #1a1917;
    --text-secondary: #6b6a65;
    --text-muted: #9e9d98;
    --green: #0f7a4e;
    --green-bg: #e8f5ee;
    --red: #b93232;
    --red-bg: #fceaea;
    --blue: #1a5fb4;
    --blue-bg: #e8f0fc;
    --amber: #8a5c00;
    --amber-bg: #fef3d8;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #151513;
      --surface: #1e1e1b;
      --surface-alt: #252521;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text: #f0efe9;
      --text-secondary: #a8a79f;
      --text-muted: #6e6d67;
      --green: #2dbd7e;
      --green-bg: #0c2e1e;
      --red: #e06060;
      --red-bg: #2e0f0f;
      --blue: #5b9cf6;
      --blue-bg: #0d1e3a;
      --amber: #f5c842;
      --amber-bg: #2a1e00;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }
  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .logo { font-weight: 600; font-size: 16px; letter-spacing: -0.3px; }
  .logo span { color: var(--text-muted); font-weight: 400; }
  .rate-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(15,122,78,0.2);
    font-weight: 500;
  }
  .rate-pill.loading { background: var(--surface-alt); color: var(--text-muted); border-color: var(--border); }
  .rate-pill.error { background: var(--red-bg); color: var(--red); border-color: rgba(185,50,50,0.2); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* MAIN */
  main { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

  /* MONTH BAR */
  .month-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .month-bar h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; }
  .month-bar select {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: var(--radius);
    padding: 7px 12px;
    font-size: 14px;
    cursor: pointer;
  }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .metric-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.1; }
  .metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }

  /* TABS */
  .tabs { display: flex; gap: 2px; background: var(--surface-alt); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; border: 1px solid var(--border); }
  .tab {
    flex: 1; text-align: center; padding: 8px 12px; border-radius: 7px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; background: transparent; color: var(--text-secondary);
    transition: all .15s;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .tab:hover:not(.active) { color: var(--text); }

  /* CARD */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .card-title svg { color: var(--text-muted); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; color: var(--text-muted); }
  .field input, .field select {
    background: var(--surface-alt);
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    padding: 9px 11px;
    font-size: 14px;
    color: var(--text);
    width: 100%;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,95,180,0.1); }
  .preview-text { font-size: 13px; color: var(--green); font-weight: 500; margin-bottom: 12px; min-height: 20px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 7px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border-strong);
    background: var(--text); color: var(--bg);
    transition: opacity .15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--surface-alt); opacity: 1; }

  /* LIST */
  .list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .list-item:last-child { border-bottom: none; padding-bottom: 0; }
  .list-item:first-child { padding-top: 0; }
  .item-icon {
    width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .item-icon.inc { background: var(--green-bg); color: var(--green); }
  .item-icon.exp { background: var(--red-bg); color: var(--red); }
  .item-main { flex: 1; min-width: 0; }
  .item-desc { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .item-amount { text-align: right; flex-shrink: 0; }
  .item-amount .cop { font-weight: 600; font-size: 15px; }
  .item-amount .cop.inc { color: var(--green); }
  .item-amount .cop.exp { color: var(--red); }
  .item-amount .usd { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px; border-radius: 5px;
    font-size: 14px; opacity: 0; transition: opacity .15s, color .15s;
    flex-shrink: 0;
  }
  .list-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--red); }

  /* BADGE */
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge.fijo { background: var(--blue-bg); color: var(--blue); }
  .badge.variable { background: var(--amber-bg); color: var(--amber); }

  /* CHART */
  .chart-wrap { position: relative; height: 200px; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* EMPTY */
  .empty { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; line-height: 1.6; }
  .empty strong { display: block; font-size: 15px; color: var(--text-secondary); margin-bottom: 4px; }

  /* PROGRESS */
  .cat-row { margin-bottom: 12px; }
  .cat-row:last-child { margin-bottom: 0; }
  .cat-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .cat-name { font-weight: 500; }
  .cat-amount { color: var(--text-secondary); }
  .progress-track { height: 5px; background: var(--surface-alt); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

  /* SUMMARY ROW */
  .summary-split { display: flex; gap: 12px; margin-bottom: 16px; }
  .split-item { flex: 1; background: var(--surface-alt); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
  .split-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
  .split-value { font-size: 17px; font-weight: 600; }
  .split-value.blue { color: var(--blue); }
  .split-value.amber { color: var(--amber); }

  @media (max-width: 500px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .summary-split { flex-direction: column; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Mis Finanzas <span>USD → COP</span></div>
    <div id="ratePill" class="rate-pill loading">
      <div class="dot"></div>
      <span id="rateText">Cargando tasa...</span>
    </div>
  </div>
</header>

<main>
  <div class="month-bar">
    <h2 id="monthTitle">—</h2>
    <select id="monthSelect" aria-label="Seleccionar mes"></select>
  </div>

  <div class="metrics" id="metricsGrid"></div>

  <div class="tabs" role="tablist">
    <button class="tab active" onclick="switchTab('resumen')" role="tab">Resumen</button>
    <button class="tab" onclick="switchTab('ingresos')" role="tab">Ingresos</button>
    <button class="tab" onclick="switchTab('gastos')" role="tab">Gastos</button>
  </div>

  <!-- RESUMEN -->
  <div id="resumen" class="section active">
    <div class="summary-split">
      <div class="split-item">
        <div class="split-label">Gastos fijos</div>
        <div class="split-value blue" id="s-fijos">$0</div>
      </div>
      <div class="split-item">
        <div class="split-label">Gastos variables</div>
        <div class="split-value amber" id="s-variables">$0</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Gastos por categoría
      </div>
      <div id="catBars"></div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Últimas transacciones
      </div>
      <div id="recentList"></div>
    </div>
  </div>

  <!-- INGRESOS -->
  <div id="ingresos" class="section">
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12l4-4 4 4"/></svg>
        Registrar ingreso
      </div>
      <div class="form-grid">
        <div class="field" style="grid-column: span 2;">
          <label>Descripción</label>
          <input type="text" id="incDesc" placeholder="Ej: Pago cliente, freelance...">
        </div>
        <div class="field">
          <label>Monto (USD)</label>
          <input type="number" id="incUSD" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="incDate">
        </div>
        <div class="field">
          <label>Tasa USD/COP</label>
          <input type="number" id="incRate" placeholder="Tasa del día" step="1">
        </div>
      </div>
      <div class="preview-text" id="incPreview"></div>
      <button class="btn" onclick="addIncome()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Agregar ingreso
      </button>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        Ingresos del mes
      </div>
      <div id="incomeList"></div>
    </div>
  </div>

  <!-- GASTOS -->
  <div id="gastos" class="section">
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-8M8 12l4 4 4-4"/></svg>
        Registrar gasto
      </div>
      <div class="form-grid">
        <div class="field" style="grid-column: span 2;">
          <label>Descripción</label>
          <input type="text" id="expDesc" placeholder="Ej: Arriendo, mercado...">
        </div>
        <div class="field">
          <label>Monto (COP)</label>
          <input type="number" id="expCOP" placeholder="0" min="0" step="1000">
        </div>
        <div class="field">
          <label>Categoría</label>
          <select id="expCat">
            <option>Vivienda</option>
            <option>Alimentación</option>
            <option>Transporte</option>
            <option>Salud</option>
            <option>Servicios públicos</option>
            <option>Entretenimiento</option>
            <option>Ropa</option>
            <option>Educación</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo</label>
          <select id="expType">
            <option value="fijo">Fijo</option>
            <option value="variable">Variable</option>
          </select>
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="expDate">
        </div>
      </div>
      <button class="btn" onclick="addExpense()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Agregar gasto
      </button>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        Gastos del mes
      </div>
      <div id="expenseList"></div>
    </div>
  </div>

</main>

<script>
const CAT_COLORS = ['#2a78d6','#1baf7a','#eda100','#4a3aa7','#e34948','#e87ba4','#eb6834','#008300','#73726c'];

let state = { rate: null, incomes: [], expenses: [], currentMonth: '' };

function loadState() {
  try {
    const raw = localStorage.getItem('finanzas_cop_v1');
    if (raw) { const d = JSON.parse(raw); state.incomes = d.incomes||[]; state.expenses = d.expenses||[]; }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('finanzas_cop_v1', JSON.stringify({incomes:state.incomes, expenses:state.expenses})); } catch(e) {}
}

async function fetchRate() {
  const pill = document.getElementById('ratePill');
  const txt = document.getElementById('rateText');
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await res.json();
    state.rate = Math.round(data.rates.COP);
    pill.className = 'rate-pill';
    txt.textContent = `1 USD = ${state.rate.toLocaleString('es-CO')} COP`;
    document.getElementById('incRate').value = state.rate;
    updatePreview();
  } catch(e) {
    pill.className = 'rate-pill error';
    txt.textContent = 'Sin conexión — ingresa tasa manualmente';
    state.rate = null;
  }
}

function buildMonthSelect() {
  const sel = document.getElementById('monthSelect');
  const now = new Date();
  const opts = [];
  for(let i=0;i<18;i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('es-CO',{month:'long',year:'numeric'});
    opts.push({key, label: label.charAt(0).toUpperCase()+label.slice(1)});
  }
  sel.innerHTML = opts.map(o=>`<option value="${o.key}">${o.label}</option>`).join('');
  state.currentMonth = opts[0].key;
  setMonthTitle(opts[0].label);
  sel.onchange = () => {
    state.currentMonth = sel.value;
    const lbl = sel.options[sel.selectedIndex].text;
    setMonthTitle(lbl);
    render();
  };
}

function setMonthTitle(label) {
  document.getElementById('monthTitle').textContent = label;
}

function getMonthData() {
  const m = state.currentMonth;
  return {
    incomes: state.incomes.filter(i=>i.date.startsWith(m)),
    expenses: state.expenses.filter(e=>e.date.startsWith(m))
  };
}

function fmtCOP(n) { return '$'+Math.round(n).toLocaleString('es-CO'); }
function fmtUSD(n) { return 'US$'+parseFloat(n).toFixed(2); }
function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() { renderMetrics(); renderSummary(); renderCatBars(); renderIncomeList(); renderExpenseList(); renderRecent(); }

function renderMetrics() {
  const {incomes,expenses} = getMonthData();
  const totalInc = incomes.reduce((s,i)=>s+i.cop,0);
  const totalExp = expenses.reduce((s,e)=>s+e.cop,0);
  const balance = totalInc - totalExp;
  const pct = totalInc>0 ? Math.round(totalExp/totalInc*100) : 0;
  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-value green">${fmtCOP(totalInc)}</div><div class="metric-sub">${fmtUSD(incomes.reduce((s,i)=>s+i.usd,0))}</div></div>
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value red">${fmtCOP(totalExp)}</div><div class="metric-sub">${pct}% del ingreso</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value ${balance>=0?'green':'red'}">${fmtCOP(balance)}</div><div class="metric-sub">${balance>=0?'Superávit':'Déficit'}</div></div>
    <div class="metric"><div class="metric-label">Transacciones</div><div class="metric-value">${incomes.length+expenses.length}</div><div class="metric-sub">${incomes.length} ingresos · ${expenses.length} gastos</div></div>
  `;
}

function renderSummary() {
  const {expenses} = getMonthData();
  const fijos = expenses.filter(e=>e.type==='fijo').reduce((s,e)=>s+e.cop,0);
  const vars = expenses.filter(e=>e.type==='variable').reduce((s,e)=>s+e.cop,0);
  document.getElementById('s-fijos').textContent = fmtCOP(fijos);
  document.getElementById('s-variables').textContent = fmtCOP(vars);
}

function renderCatBars() {
  const {expenses} = getMonthData();
  const el = document.getElementById('catBars');
  if(!expenses.length){el.innerHTML='<div class="empty"><strong>Sin gastos este mes</strong>Agrega tu primer gasto en la pestaña Gastos.</div>';return;}
  const cats = {};
  expenses.forEach(e=>{ cats[e.cat]=(cats[e.cat]||0)+e.cop; });
  const total = Object.values(cats).reduce((s,v)=>s+v,0);
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  el.innerHTML = sorted.map(([cat,val],i)=>`
    <div class="cat-row">
      <div class="cat-head">
        <span class="cat-name">${esc(cat)}</span>
        <span class="cat-amount">${fmtCOP(val)} <span style="color:var(--text-muted);font-size:11px">${Math.round(val/total*100)}%</span></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${Math.round(val/total*100)}%;background:${CAT_COLORS[i%CAT_COLORS.length]}"></div>
      </div>
    </div>`).join('');
}

function renderIncomeList() {
  const {incomes} = getMonthData();
  const el = document.getElementById('incomeList');
  if(!incomes.length){el.innerHTML='<div class="empty"><strong>Sin ingresos este mes</strong>Registra tu primer ingreso arriba.</div>';return;}
  el.innerHTML = incomes.slice().reverse().map(i=>`
    <div class="list-item">
      <div class="item-icon inc">↓</div>
      <div class="item-main">
        <div class="item-desc">${esc(i.desc)}</div>
        <div class="item-meta">${i.date} · Tasa ${Math.round(i.rate).toLocaleString('es-CO')}</div>
      </div>
      <div class="item-amount">
        <div class="cop inc">+${fmtCOP(i.cop)}</div>
        <div class="usd">${fmtUSD(i.usd)}</div>
      </div>
      <button class="delete-btn" onclick="deleteIncome('${i.id}')" aria-label="Eliminar">✕</button>
    </div>`).join('');
}

function renderExpenseList() {
  const {expenses} = getMonthData();
  const el = document.getElementById('expenseList');
  if(!expenses.length){el.innerHTML='<div class="empty"><strong>Sin gastos este mes</strong>Registra tu primer gasto arriba.</div>';return;}
  el.innerHTML = expenses.slice().reverse().map(e=>`
    <div class="list-item">
      <div class="item-icon exp">↑</div>
      <div class="item-main">
        <div class="item-desc">${esc(e.desc)} <span class="badge ${e.type}">${e.type}</span></div>
        <div class="item-meta">${e.date} · ${esc(e.cat)}</div>
      </div>
      <div class="item-amount">
        <div class="cop exp">-${fmtCOP(e.cop)}</div>
      </div>
      <button class="delete-btn" onclick="deleteExpense('${e.id}')" aria-label="Eliminar">✕</button>
    </div>`).join('');
}

function renderRecent() {
  const {incomes,expenses} = getMonthData();
  const all = [
    ...incomes.map(i=>({...i,kind:'inc'})),
    ...expenses.map(e=>({...e,kind:'exp'}))
  ].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
  const el = document.getElementById('recentList');
  if(!all.length){el.innerHTML='<div class="empty"><strong>Sin transacciones</strong>Agrega ingresos o gastos para verlos aquí.</div>';return;}
  el.innerHTML = all.map(t=>`
    <div class="list-item">
      <div class="item-icon ${t.kind}">${t.kind==='inc'?'↓':'↑'}</div>
      <div class="item-main">
        <div class="item-desc">${esc(t.desc)}</div>
        <div class="item-meta">${t.date}${t.cat?' · '+esc(t.cat):''}</div>
      </div>
      <div class="item-amount">
        <div class="cop ${t.kind}">${t.kind==='inc'?'+':'-'}${fmtCOP(t.cop)}</div>
      </div>
    </div>`).join('');
}

function updatePreview() {
  const usd = parseFloat(document.getElementById('incUSD').value)||0;
  const rate = parseFloat(document.getElementById('incRate').value)||state.rate||0;
  const el = document.getElementById('incPreview');
  if(usd>0 && rate>0) el.textContent = `= ${fmtCOP(usd*rate)} COP`;
  else el.textContent = '';
}

function addIncome() {
  const desc = document.getElementById('incDesc').value.trim();
  const usd = parseFloat(document.getElementById('incUSD').value);
  const date = document.getElementById('incDate').value;
  const rate = parseFloat(document.getElementById('incRate').value);
  if(!desc||!usd||!date||!rate){alert('Completa todos los campos');return;}
  state.incomes.push({id:Date.now()+'i', desc, usd, cop:Math.round(usd*rate), rate, date});
  saveState();
  document.getElementById('incDesc').value='';
  document.getElementById('incUSD').value='';
  document.getElementById('incDate').value=today();
  document.getElementById('incRate').value=state.rate||'';
  document.getElementById('incPreview').textContent='';
  render();
}

function addExpense() {
  const desc = document.getElementById('expDesc').value.trim();
  const cop = parseFloat(document.getElementById('expCOP').value);
  const cat = document.getElementById('expCat').value;
  const type = document.getElementById('expType').value;
  const date = document.getElementById('expDate').value;
  if(!desc||!cop||!date){alert('Completa todos los campos');return;}
  state.expenses.push({id:Date.now()+'e', desc, cop, cat, type, date});
  saveState();
  document.getElementById('expDesc').value='';
  document.getElementById('expCOP').value='';
  document.getElementById('expDate').value=today();
  render();
}

function deleteIncome(id) { if(confirm('¿Eliminar este ingreso?')){ state.incomes=state.incomes.filter(i=>i.id!==id); saveState(); render(); } }
function deleteExpense(id) { if(confirm('¿Eliminar este gasto?')){ state.expenses=state.expenses.filter(e=>e.id!==id); saveState(); render(); } }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['resumen','ingresos','gastos'][i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

function today() { return new Date().toISOString().split('T')[0]; }

document.getElementById('incUSD').addEventListener('input', updatePreview);
document.getElementById('incRate').addEventListener('input', updatePreview);

loadState();
buildMonthSelect();
render();
fetchRate();
</script>
</body>
</html>
